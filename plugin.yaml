name: telex-platform
kind: platform
version: 1.0.0
description: >
  Voyager Telex messaging platform adapter for Hermes Agent.
  Supports 1:1 chats and channels over a single subscribe stream,
  using a Telex bot API key. Feature parity with openclaw-telex.
author: AI Agent Team
# No hard-required env vars: the bot key normally lives in config.yaml under
# platforms.telex.extra.accounts.<id>. Listing TELEX_API_KEY in requires_env
# would make `hermes plugins install` prompt for it interactively and break the
# one-line install (hermes-seatalk ships requires_env: [] for the same reason).
requires_env: []
optional_env:
  - name: TELEX_API_KEY
    description: Telex bot API key (X-API-Key) for env-only setups; shown once at register/rotate. Prefer config.yaml platforms.telex.extra.
    secret: true
  - name: TELEX_BASE_URL
    description: Telex base URL (default https://voyager.ingarena.net)
provides_tools:
  - telex
